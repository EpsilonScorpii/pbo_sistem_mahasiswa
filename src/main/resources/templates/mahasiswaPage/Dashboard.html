<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mahasiswa</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    

    <style>
        body{
            background-color:#f8f9fa;
        }

        .sidebar{
            min-height:100vh;
            background:#212529;
        }

        .sidebar .nav-link{
            color:#adb5bd;
            padding:12px;
            border-radius:8px;
            margin-bottom:5px;
        }

        .sidebar .nav-link:hover{
            background:#343a40;
            color:white;
        }

        .content{
            padding:30px;
        }

        .table-card{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 15px rgba(0,0,0,0.05);
        }

        .navbar-brand{
            font-weight:bold;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">

        <span class="navbar-brand">
            Sistem Informasi Akademik
        </span>

        <div class="ms-auto text-white">
            Halo, Mahasiswa
        </div>

    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">

            <h5 class="text-white mb-4">
                Menu
            </h5>

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a href="#" class="nav-link active">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">
                        Mahasiswa
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">
                        Dosen
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">
                        Mata Kuliah
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-danger">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

        <!-- Content -->
        <div class="col-md-10 content">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h2>Data Mahasiswa</h2>
                    <p class="text-muted">
                        Kelola data mahasiswa kampus
                    </p>
                </div>

                <a href="/mahasiswa/tambah" class="btn btn-primary">
                    + Tambah Mahasiswa
                </a>

            </div>

            <div class="table-card">

                <div class="row mb-3">

                    <div class="col-md-4">
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Cari mahasiswa...">
                    </div>

                </div>

                <table class="table table-hover align-middle">

                    <thead class="table-light">

                    <tr>
                        <th>NIM</th>
                        <th>Nama</th>
                        <th>Jurusan</th>
                        <th>Email</th>
                        <th width="180">Aksi</th>
                    </tr>

                    </thead>

                    <tbody>


                    <tr th:each="mahasiswa : ${listMahasiswa}">
                        <td th:text="${mahasiswa.nim}"></td>
                        <td th:text="${mahasiswa.nama}"></td>
                        <td th:text="${mahasiswa.jurusan}"></td>
                        <td th:text="${mahasiswa.email}"></td>


                        <td>

                            <button class="btn btn-warning btn-sm">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm">
                                Hapus
                            </button>

                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
