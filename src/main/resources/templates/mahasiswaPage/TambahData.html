<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tambah Mahasiswa</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            min-height:100vh;
            background:#f4f6f9;
            display:flex;
            align-items:center;
            justify-content:center;
        }


        .form-container{

            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.08);

        }


        .form-title{

            text-align:center;
            margin-bottom:30px;

        }


        .form-title h2{

            font-weight:700;
            color:#212529;

        }


        .form-control{

            height:45px;
            border-radius:12px;

        }


        .form-control:focus{

            border-color:#0d6efd;
            box-shadow:0 0 0 .2rem rgba(13,110,253,.15);

        }


        label{

            font-weight:600;
            margin-bottom:8px;

        }


        .btn{

            border-radius:12px;
            padding:10px 25px;
            font-weight:600;

        }


        .btn-save{

            background:#0d6efd;
            color:white;

        }


        .btn-save:hover{

            background:#0b5ed7;
            color:white;

        }


        .back{

            text-decoration:none;

        }


    </style>

</head>


<body>


<div class="form-container">


    <div class="form-title">

        <h2>
            Tambah Mahasiswa
        </h2>

        <p class="text-muted">
            Masukkan data mahasiswa baru
        </p>

    </div>



    <form action="/mahasiswa/simpan"
          method="post"
          th:object="${mahasiswa}">


        <div class="mb-3">

            <label>NIM</label>

            <input
            type="text"
            class="form-control"
            th:field="*{nim}"
            placeholder="Masukkan NIM">

        </div>



        <div class="mb-3">

            <label>Nama Mahasiswa</label>

            <input
            type="text"
            class="form-control"
            th:field="*{nama}"
            placeholder="Masukkan nama">

        </div>




        <div class="mb-3">

            <label>Jurusan</label>

            <input
            type="text"
            class="form-control"
            th:field="*{jurusan}"
            placeholder="Masukkan jurusan">

        </div>




        <div class="mb-4">

            <label>Email</label>

            <input
            type="email"
            class="form-control"
            th:field="*{email}"
            placeholder="Masukkan email">

        </div>

        <div class="mb-3">

        <label>Dosen Pembimbing</label>

        <select class="form-control" name="dosen">
            <option 
            th:each="d : ${listDosen}"
            th:value="${d.id_dosen}"
            th:text="${d.nama_dosen}">
            </option>
        </select>

        </div>




        <div class="d-flex justify-content-between">


            <a href="/mahasiswa"
               class="btn btn-outline-secondary back">

                Kembali

            </a>



            <button
            class="btn btn-save">

                Simpan

            </button>


        </div>


    </form>


</div>


<script src="/js/bootstrap.bundle.min.js"></script>

</body>

</html>
